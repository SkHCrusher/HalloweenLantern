; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Lokale Overrides (z. B. echter PROJECT_KEY) gehören in platformio_local.ini.
; Diese Datei ist gitignored und wird, falls vorhanden, automatisch geladen.
; Sie überschreibt nur einzelne Werte aus [secrets] — build_flags bleiben hier.
[platformio]
extra_configs = platformio_local.ini

; Fallback-Key. Wird nur verwendet, wenn keine platformio_local.ini existiert
; bzw. dort kein eigener project_key gesetzt ist. Eigene Laternen sollten
; immer einen eigenen Key in platformio_local.ini setzen, sonst können
; verschiedene Builds mit dem Fallback sich gegenseitig stören.
[secrets]
project_key = fallback-default-set-your-own-in-platformio_local.ini

[env:lolin_c3_mini]
platform = espressif32
board = lolin_c3_mini
framework = arduino
monitor_speed = 115200
upload_protocol = esptool
upload_speed = 921600
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D PROJECT_KEY='"${secrets.project_key}"'
lib_deps =
    fastled/FastLED@^3.6.0
test_ignore = *

; Native-Env für Unit-Tests der reinen Helfer-Funktionen (XY-Mapping,
; FNV-1a-Hash, Sync-Key-Ableitung). Läuft auf dem Build-Host, kein ESP32 nötig.
;   pio test -e native
[env:native]
platform = native
test_framework = unity
build_flags =
    -std=gnu++17
